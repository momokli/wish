<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
        />
        <title>wish — song requests</title>
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <div id="app">
            <header>
                <h1 id="event-name">wish</h1>
            </header>

            <main id="main-content">
                <div id="view-search" class="view active">
                    <div class="search-wrapper" id="searchWrapper">
                        <div class="input-box">
                            <svg viewBox="0 0 24 24">
                                <circle cx="11" cy="11" r="8" />
                                <path d="m21 21-4.3-4.3" />
                            </svg>
                            <input
                                type="text"
                                id="searchInput"
                                placeholder="Search for a song or artist..."
                                autocomplete="off"
                            />
                        </div>
                        <div class="filters">
                            <button class="filter-pill" data-source="spotify">
                                <svg
                                    width="14"
                                    height="14"
                                    viewBox="0 0 24 24"
                                    fill="#1DB954"
                                >
                                    <path
                                        d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.019.599-1.559.3z"
                                    />
                                </svg>
                                <span class="count"></span>
                            </button>
                            <button class="filter-pill" data-source="youtube">
                                <svg
                                    width="16"
                                    height="12"
                                    viewBox="0 0 24 24"
                                    fill="#FF0000"
                                >
                                    <path
                                        d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"
                                    />
                                </svg>
                                <span class="count"></span>
                            </button>
                            <button class="filter-pill" data-source="soundcloud">
                                <svg
                                    width="16"
                                    height="10"
                                    viewBox="0 0 24 24"
                                    fill="#FC3D0A"
                                >
                                    <path
                                        d="M1.175 12.475l.005 2.893-.005.024c-.005.022-.027.205-.027.205.15 2.38 2.103 4.261 4.513 4.316l11.365-.003c3.822-.178 6.825-3.347 6.834-7.202.009-3.872-3.015-7.024-6.868-7.024-.556 0-1.097.067-1.617.195-.614-2.273-2.658-3.91-5.057-3.879-2.832.034-5.125 2.338-5.143 5.187v3.388zm2.934-.153l-.005 2.618c0 .052.042.094.094.094h.147a.094.094 0 0 0 .094-.094l.005-2.618a.094.094 0 0 0-.094-.094h-.147a.094.094 0 0 0-.094.094zm2.159-1.865l-.009 4.483c0 .052.042.094.094.094h.147a.094.094 0 0 0 .094-.094l.009-4.483a.094.094 0 0 0-.094-.094h-.147a.094.094 0 0 0-.094.094z"
                                    />
                                </svg>
                                <span class="count"></span>
                            </button>
                        </div>
                    </div>

                    <div id="results-container" class="results-container"></div>
                </div>

                <div id="view-requests" class="view">
                    <div class="queue-stats">
                        <div class="stat-box">
                            <div class="stat-val" id="stat-total">-</div>
                            <div class="stat-label">Total</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-val" id="stat-ready">-</div>
                            <div class="stat-label">Available</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-val" id="stat-pending">-</div>
                            <div class="stat-label">Requested</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-val" id="stat-failed">-</div>
                            <div class="stat-label">Failed</div>
                        </div>
                    </div>
                    <div id="queue-list" class="queue-list">
                        <div class="empty-state">Loading requests...</div>
                    </div>
                </div>

                <div id="view-playlists" class="view">
                    <div
                        style="
                            padding: 16px;
                            border-bottom: 1px solid var(--border);
                            display: flex;
                            gap: 8px;
                        "
                    >
                        <input
                            type="text"
                            id="playlistUrlInput"
                            placeholder="Paste a Spotify, YouTube, or SoundCloud playlist URL..."
                            style="
                                flex: 1;
                                padding: 12px;
                                border-radius: 8px;
                                border: 1px solid var(--border);
                                background: var(--card);
                                color: #fff;
                                font-family: var(--font-serif);
                                font-size: 14px;
                                outline: none;
                            "
                        />
                        <button
                            id="addPlaylistBtn"
                            onclick="addPlaylist()"
                            style="
                                padding: 12px 20px;
                                border-radius: 8px;
                                border: 1px solid var(--want-btn);
                                background: transparent;
                                color: var(--want-btn-text);
                                font-family: var(--font-mono);
                                font-size: 12px;
                                font-weight: bold;
                                cursor: pointer;
                                white-space: nowrap;
                            "
                        >
                            + Add
                        </button>
                    </div>
                    <div id="playlist-list" style="padding: 0 16px 100px">
                        <div class="empty-state">Loading playlists...</div>
                    </div>
                </div>
            </main>

            <nav class="bottom-nav">
                <button
                    id="nav-search"
                    class="nav-btn active"
                    onclick="switchTab('search')"
                >
                    <svg viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.3-4.3" />
                    </svg>
                    Search
                </button>
                <button id="nav-requests" class="nav-btn" onclick="switchTab('requests')">
                    <svg viewBox="0 0 24 24">
                        <rect width="8" height="4" x="8" y="2" rx="1" ry="1" />
                        <path
                            d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
                        />
                    </svg>
                    Requests <span id="queue-badge" class="badge">0</span>
                </button>
                <button
                    id="nav-playlists"
                    class="nav-btn"
                    onclick="switchTab('playlists')"
                >
                    <svg
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                        fill="none"
                        stroke-width="2"
                    >
                        <line x1="8" y1="6" x2="21" y2="6" />
                        <line x1="8" y1="12" x2="21" y2="12" />
                        <line x1="8" y1="18" x2="21" y2="18" />
                        <line x1="3" y1="6" x2="3.01" y2="6" />
                        <line x1="3" y1="12" x2="3.01" y2="12" />
                        <line x1="3" y1="18" x2="3.01" y2="18" />
                    </svg>
                    Playlists <span id="playlist-badge" class="badge">0</span>
                </button>
            </nav>

            <div id="toasts"></div>
        </div>

        <script src="js/app.js"></script>
        <script src="js/playlists.js"></script>
    </body>
</html>
